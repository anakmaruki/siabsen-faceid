<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - SIABSEN FACE ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-gradient sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="bi bi-person-check"></i> SIABSEN FACE ID
            </a>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-sm btn-outline-light" id="darkModeBtn" onclick="toggleDarkMode()">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="dropdown">
                    <button class="btn btn-sm btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> <span id="userName">Admin</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Profil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" id="logoutBtn" href="#"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="p-3 border-bottom">
            <h6 class="text-light fw-bold mb-0">Menu</h6>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="dashboard.html">
                    <i class="bi bi-graph-up"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="pegawai.html">
                    <i class="bi bi-people"></i> Master Pegawai
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                    <i class="bi bi-calendar-check"></i> Rekap Absensi
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="izin.html">
                    <i class="bi bi-file-earmark-text"></i> Izin & Sakit
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                    <i class="bi bi-download"></i> Export Data
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid dashboard-container">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold mb-1">Dashboard Admin</h2>
                    <p class="text-muted">Selamat datang di sistem absensi pegawai</p>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="row g-3 mb-4">
                <div class="col-md-6 col-lg-4" id="stat-totalPegawai"></div>
                <div class="col-md-6 col-lg-4" id="stat-hadirHariIni"></div>
                <div class="col-md-6 col-lg-4" id="stat-terlambat"></div>
                <div class="col-md-6 col-lg-4" id="stat-izin"></div>
                <div class="col-md-6 col-lg-4" id="stat-sakit"></div>
                <div class="col-md-6 col-lg-4" id="stat-alpha"></div>
            </div>

            <!-- Charts -->
            <div class="row g-4 mb-4">
                <div class="col-lg-6">
                    <div class="chart-container">
                        <h5 class="fw-bold mb-3">Kehadiran Mingguan</h5>
                        <canvas id="weeklyAttendanceChart"></canvas>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-container">
                        <h5 class="fw-bold mb-3">Kehadiran Bulanan</h5>
                        <canvas id="monthlyAttendanceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Activity Table -->
            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm">
                        <div class="card-header bg-light border-bottom">
                            <h5 class="card-title fw-bold mb-0">
                                <i class="bi bi-clock-history"></i> Aktivitas Absensi Terbaru
                            </h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>NIP</th>
                                            <th>Nama</th>
                                            <th>Tipe</th>
                                            <th>Waktu</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="activityTableBody">
                                        <!-- Loaded by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
